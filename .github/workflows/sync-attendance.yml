name: Sync City Heaven Attendance

on:
  schedule:
    - cron: '0 * * * *'   # 毎時0分（JST 9:00〜翌8:00）
  workflow_dispatch:       # 手動実行も可能

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Fetch attendance from City Heaven
        run: python scripts/fetch_attendance.py

      - name: Commit attend.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add attend.json
          git diff --staged --quiet || git commit -m "Update attendance data [skip ci]"
          git push
