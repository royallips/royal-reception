name: Sync Attendance

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Fetch attendance from City Heaven
        run: node scripts/fetch_attendance.js

      - name: Commit attend.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add attend.json
          git diff --staged --quiet || git commit -m "Update attendance data [skip ci]"
          git push
