name: Sync City Heaven Attendance

on:
  schedule:
    - cron: '0 * * * *'   # 毎時0分
  workflow_dispatch:       # 手動実行も可能

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright and Chromium
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Fetch attendance from City Heaven
        run: node scripts/fetch_attendance.js

      - name: Commit attend.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add attend.json
          git diff --staged --quiet || git commit -m "Update attendance data [skip ci]"
          git push
