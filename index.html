<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ROYAL LIPS VIP</title>
<style>
  :root{
    --wine:#1E3A30;--wine-dark:#122620;--gold:#C9A24B;--gold-soft:#E4CD93;
    --cream:#FAF6F1;--ink:#2A1A20;--line:#E7DDD6;--gray:#9A8E92;--danger:#B03050;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;
    background:var(--cream);color:var(--ink);overflow:hidden;}
  button{font-family:inherit;cursor:pointer;border:none;}

  header{height:58px;display:flex;align-items:center;justify-content:space-between;
    padding:0 16px;background:var(--wine);color:#fff;position:relative;z-index:30;}
  .brand{display:flex;align-items:baseline;gap:9px;}
  .logoImg{height:42px;display:block;}
  .modeToggle{display:flex;background:rgba(0,0,0,.22);border-radius:999px;padding:4px;}
  .modeToggle button{background:transparent;color:rgba(255,255,255,.65);
    padding:8px 16px;border-radius:999px;font-size:14px;font-weight:700;transition:.15s;}
  .modeToggle button.active{background:#fff;color:var(--wine);}

  main{height:calc(100% - 58px);overflow-y:auto;-webkit-overflow-scrolling:touch;}

  /* お客様用 */
  .custBar{display:flex;align-items:center;gap:10px;padding:12px 18px 0;}
  .resetBtn{background:#fff;border:1px solid var(--line);color:var(--wine);font-weight:700;
    font-size:14px;border-radius:10px;padding:9px 16px;}
  .returnZone{margin-left:auto;display:flex;align-items:center;gap:7px;border:2px dashed #D7C7BD;
    color:var(--gray);font-weight:700;font-size:14px;border-radius:12px;padding:9px 18px;transition:.15s;}
  .returnZone .ic{font-size:16px;}
  .returnZone.armed{border-color:var(--gold);color:var(--wine);}
  .returnZone.over{background:var(--wine);border-color:var(--wine);color:#fff;transform:scale(1.05);}

  .grid{display:grid;gap:14px;padding:14px 18px 18px;grid-template-columns:repeat(3,1fr);}
  .card{position:relative;aspect-ratio:3/4;border-radius:16px;overflow:hidden;background:#ddd;
    box-shadow:0 4px 14px rgba(58,15,30,.10);transition:transform .12s;border:1px solid rgba(0,0,0,.04);}
  .card:active{transform:scale(.97);}
  .card .photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .card .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:64px;font-weight:700;color:rgba(255,255,255,.9);}
  .card .scrim{position:absolute;left:0;right:0;bottom:0;height:42%;
    background:linear-gradient(to top,rgba(20,5,12,.78),transparent);}
  .card .name{position:absolute;left:0;right:0;bottom:0;padding:14px 16px;color:#fff;
    font-size:23px;font-weight:700;letter-spacing:.03em;text-shadow:0 1px 4px rgba(0,0,0,.5);}

  .dragClone{position:fixed;width:130px;aspect-ratio:3/4;border-radius:12px;overflow:hidden;
    transform:translate(-50%,-50%);opacity:.9;pointer-events:none;z-index:70;box-shadow:0 12px 32px rgba(0,0,0,.45);}
  .dragClone img{width:100%;height:100%;object-fit:cover;}
  .dragClone .cl-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:48px;font-weight:700;}
  body.dragging{overflow:hidden;}
  body.dragging .card{transition:none;}

  /* スタッフ用：4列の選択グリッド */
  .pickWrap{padding:12px 12px 84px;}
  .pickGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
  .pcard{position:relative;aspect-ratio:3/4;border-radius:11px;overflow:hidden;background:#ddd;
    border:2px solid transparent;transition:transform .1s;}
  .pcard:active{transform:scale(.96);}
  .pcard .photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .pcard .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:34px;font-weight:700;color:rgba(255,255,255,.92);}
  .pcard .scrim{position:absolute;left:0;right:0;bottom:0;height:46%;
    background:linear-gradient(to top,rgba(20,5,12,.8),transparent);}
  .pcard .pname{position:absolute;left:0;right:0;bottom:0;padding:6px 8px;color:#fff;
    font-size:14px;font-weight:700;text-shadow:0 1px 3px rgba(0,0,0,.5);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .pcard.selected{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,162,75,.5);}
  .pcard .check{position:absolute;top:6px;left:6px;width:26px;height:26px;border-radius:50%;
    background:var(--gold);color:#3A0F1E;font-size:15px;font-weight:800;display:none;
    align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.3);}
  .pcard.selected .check{display:flex;}
  .doneTag{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    background:#1F8A5B;color:#fff;font-size:19px;font-weight:800;
    border-radius:10px;padding:6px 18px;box-shadow:0 2px 8px rgba(0,0,0,.35);}
  .pcard.added{border-color:#1F8A5B;}
  .soldBtn{position:absolute;top:6px;right:6px;font-size:11px;font-weight:800;border-radius:7px;
    padding:4px 8px;background:rgba(255,255,255,.85);color:var(--danger);}
  .soldBtn.active{background:var(--danger);color:#fff;}
  .pcard.sold{opacity:.42;}
  .pcard.sold .pname{text-decoration:line-through;}

  .doneBar{position:fixed;left:0;right:0;bottom:0;height:68px;background:#fff;border-top:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;padding:0 18px;z-index:25;
    box-shadow:0 -4px 16px rgba(58,15,30,.08);}
  .doneBar .cnt{font-size:15px;font-weight:700;color:var(--wine);}
  .doneBar .cnt b{font-size:20px;}
  .doneBar .done{background:var(--wine);color:#fff;border-radius:12px;padding:13px 30px;font-size:16px;font-weight:800;}
  .doneBar .done:disabled{background:#D9CEC8;color:#fff;}

  /* 設定：6列グリッド */
  .setWrap{padding:16px 18px 40px;}
  .setHead{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
  .setHead h2{font-size:17px;color:var(--wine);margin:0;}
  .btn{background:var(--wine);color:#fff;border-radius:10px;padding:10px 16px;font-size:14px;font-weight:700;}
  .btn.ghost{background:#fff;color:var(--wine);border:1px solid var(--line);}
  .bulkArea{width:100%;height:220px;padding:12px;border:1px solid var(--line);border-radius:10px;
    font-size:14px;font-family:inherit;line-height:1.7;resize:vertical;}
  .bulkArea:focus{outline:none;border-color:var(--wine);}

  .setGrid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;}
  .scard{cursor:pointer;}
  .sthumb{position:relative;aspect-ratio:3/4;border-radius:10px;overflow:hidden;background:#ddd;border:1px solid rgba(0,0,0,.04);}
  .sthumb img{width:100%;height:100%;object-fit:cover;}
  .sthumb .ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:30px;font-weight:700;}
  .sthumb .soldtag{position:absolute;top:5px;left:5px;background:var(--danger);color:#fff;
    font-size:10px;font-weight:800;border-radius:6px;padding:2px 6px;}
  .sname{margin-top:6px;font-size:13px;font-weight:700;text-align:center;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .photoSwitch{display:flex;gap:3px;margin-top:4px;}
  .photoSwitch button{flex:1;padding:3px 0;border:1px solid var(--line);border-radius:5px;
    font-size:11px;font-weight:700;background:#fff;color:var(--gray);}
  .photoSwitch button.active{background:var(--wine);color:#fff;border-color:var(--wine);}
  .empty{color:var(--gray);font-size:14px;padding:14px 2px;}

  /* 全画面ビューア */
  .viewer{position:fixed;inset:0;z-index:50;background:#0E1F18;display:none;align-items:center;justify-content:center;}
  .viewer.show{display:flex;}
  .viewer img{max-width:100%;max-height:100%;object-fit:contain;}
  .viewer .vph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;color:#fff;}
  .viewer .vph .big{font-size:120px;font-weight:800;}
  .viewer .vname{position:absolute;bottom:36px;left:0;right:0;text-align:center;color:#fff;
    font-size:30px;font-weight:700;text-shadow:0 2px 10px rgba(0,0,0,.6);letter-spacing:.04em;}
  .viewer .close{position:absolute;top:16px;right:16px;width:46px;height:46px;border-radius:50%;
    background:rgba(255,255,255,.15);color:#fff;font-size:22px;}
  .vSwitch{position:absolute;bottom:16px;right:14px;display:none;gap:5px;}
  .vSwitch button{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.18);
    color:#fff;font-size:11px;font-weight:800;border:1.5px solid rgba(255,255,255,.35);}
  .vSwitch button.active{background:rgba(255,255,255,.82);color:var(--wine);border-color:#fff;}

  /* モーダル */
  .modal{position:fixed;inset:0;z-index:60;background:rgba(20,8,14,.55);display:none;align-items:center;justify-content:center;padding:20px;}
  .modal.show{display:flex;}
  .sheet{background:#fff;border-radius:18px;width:100%;max-width:440px;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
  .sheet h3{margin:0 0 16px;font-size:18px;color:var(--wine);}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:13px;font-weight:700;color:var(--gray);margin-bottom:6px;}
  .field input{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;font-size:15px;font-family:inherit;}
  .field input:focus{outline:none;border-color:var(--wine);}
  .sheetActs{display:flex;gap:10px;margin-top:8px;}
  .sheetActs button{flex:1;padding:12px;border-radius:10px;font-size:15px;font-weight:700;}
  .sheetActs .cancel{background:#F1ECE7;color:var(--ink);}
  .sheetActs .save{background:var(--wine);color:#fff;}
  .sheetActs .del{background:#fff;border:1px solid #EBB7C5;color:var(--danger);flex:0 0 auto;padding:12px 16px;}
</style>
</head>

      同じgirlidが既にある場合は上書き更新します。

</div>

<script>
let casts = [];          // {id,name,photo,gid,sold,shown}
let mode = 'customer';
let editId = null;
let draft = new Set();
let suppressClick = false;
const STORE_KEY = 'royal_reception_v2';
const PHOTO_BASE = 'https://royallips.github.io/royal-reception/img/';

const SAMPLE = [
  ['61727974','りの'],['26252454','あおい'],['64166799','ひな'],
  ['8663120','りつ'],['63465479','れな'],['37649668','あやの'],
  ['53809791','みほ'],['56767761','せいら'],['60068229','くらん'],
  ['60143549','わかな'],['44872394','りょうか'],['54563932','らら'],
].map(([gid,name])=>({id:'c'+gid,name,photo:'',photos:[''],photoIdx:0,gid,sold:false,shown:false}));

function load(){
  try{
    const v=localStorage.getItem(STORE_KEY);
    if(v){
      casts=JSON.parse(v);
      for(const c of casts){
        if(!c.photos) c.photos=[c.photo||''];
        if(c.photoIdx==null) c.photoIdx=0;
      }
      return;
    }
  }catch(e){}
  casts=SAMPLE; save();
}
function save(){ try{ localStorage.setItem(STORE_KEY,JSON.stringify(casts)); }catch(e){} }

function tint(name){ let h=0; for(const ch of name) h=(h*31+ch.charCodeAt(0))%360;
  return `linear-gradient(150deg,hsl(${h} 42% 46%),hsl(${(h+28)%360} 46% 34%))`; }
function find(id){ return casts.find(c=>c.id===id); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

function render(){
  document.getElementById('mCustomer').classList.toggle('active',mode==='customer');
  document.getElementById('mStaff').classList.toggle('active',mode==='staff');
  document.getElementById('mSettings').classList.toggle('active',mode==='settings');
  if(mode==='customer') renderCustomer();
  else if(mode==='staff') renderStaff();
  else renderSettings();
}

/* ===== お客様用（横3列・フリーなし） ===== */
function renderCustomer(){
  const list=casts.filter(c=>c.shown&&!c.sold)
    .sort((a,b)=>a.name.localeCompare(b.name,'ja'));  // あいうえお順
  let html=`<div class="custBar">
      <button class="resetBtn" onclick="resetCustomer()">リセット</button>
      <div class="returnZone" id="returnZone"><span class="ic">↩</span>戻す</div>
    </div>`;
  html+='<div class="grid">';
  for(const c of list) html+=custCardHTML(c);
  html+='</div>';
  document.getElementById('main').innerHTML=html;
  attachDnd();
}
function custCardHTML(c){
  const inner=c.photo
    ?`<img class="photo" src="${esc(c.photo)}" alt="" onerror="this.style.display='none'">`
    :`<div class="ph" style="background:${tint(c.name)}">${esc(c.name[0]||'')}</div>`;
  return `<div class="card" data-id="${esc(c.id)}" onclick='showPhoto(${JSON.stringify(c.id)})'>${inner}</div>`;
}
function resetCustomer(){
  for(const c of casts) c.shown=false;
  save(); renderCustomer();
}
function removeFromCustomer(id){
  const c=find(id); if(!c) return;
  c.shown=false; save(); renderCustomer();
}

/* ===== スタッフ用 ===== */
function renderStaff(){
  draft = new Set();   // 毎回まっさらから選び直し
  paintStaff();
}
function paintStaff(){
  const nonSold=casts.filter(c=>!c.sold);   // 最短順（登録順）
  const sold=casts.filter(c=>c.sold);        // 完売は最下部へ
  const list=[...nonSold,...sold];
  let html='<div class="pickWrap"><div class="pickGrid">';
  for(const c of list) html+=pcardHTML(c);
  html+='</div></div>';
  const n=draft.size;
  html+=`<div class="doneBar"><span class="cnt">選択中 <b>${n}</b> 名</span>
    <button class="done" ${n===0?'disabled':''} onclick="addSelection()">追加</button></div>`;
  document.getElementById('main').innerHTML=html;
}
function pcardHTML(c){
  const inner=c.photo
    ?`<img class="photo" src="${esc(c.photo)}" alt="" onerror="this.style.display='none'">`
    :`<div class="ph" style="background:${tint(c.name)}">${esc(c.name[0]||'')}</div>`;
  const added=c.shown&&!c.sold;                 // すでにお客様用に出している＝済
  const sel=draft.has(c.id)&&!c.sold&&!added;   // 今回新たに選択中
  const id=JSON.stringify(c.id);
  const tag = added ? '<div class="doneTag">済</div>' : '<div class="check">✓</div>';
  return `<div class="pcard ${sel?'selected':''} ${added?'added':''} ${c.sold?'sold':''}" onclick='toggleSel(${id})'>
    ${inner}<div class="scrim"></div>${tag}
    <button class="soldBtn ${c.sold?'active':''}" onclick='toggleSold(${id},event)'>完売</button>
    <div class="pname">${esc(c.name)}</div></div>`;
}
function toggleSel(id){
  const c=find(id); if(!c||c.sold||c.shown) return;   // 完売・済は選べない
  if(draft.has(id)) draft.delete(id); else draft.add(id);
  paintStaff();
}
function toggleSold(id,e){
  if(e) e.stopPropagation();
  const c=find(id); if(!c) return;
  c.sold=!c.sold;
  if(c.sold) draft.delete(id);
  save(); paintStaff();
}
function addSelection(){
  for(const id of draft){ const c=find(id); if(c&&!c.sold) c.shown=true; }  // 既存に追加
  draft = new Set();      // 追加したら選択を戻す
  save(); setMode('customer');
}

/* ===== 設定（あいうえお順・6列） ===== */
function renderSettings(){
  const list=[...casts].sort((a,b)=>a.name.localeCompare(b.name,'ja'));
  let html='<div class="setWrap"><div class="setHead"><h2>キャスト登録</h2>'
    +'<div style="margin-left:auto;display:flex;gap:8px">'
    +'<button class="btn ghost" onclick="openBulk()">まとめて登録</button>'
    +'<button class="btn" onclick="openAdd()">＋ キャスト追加</button></div></div>';
  if(list.length===0){
    html+='<div class="empty">まだ登録がありません。「＋ キャスト追加」から始めてください。</div>';
  }else{
    html+='<div class="setGrid">';
    for(const c of list){
      const inner=c.photo
        ?`<img src="${esc(c.photo)}" alt="" onerror="this.style.display='none'">`
        :`<div class="ph" style="background:${tint(c.name)}">${esc(c.name[0]||'')}</div>`;
      const photos=c.photos||[c.photo||''];
      const validCnt=photos.filter(Boolean).length;
      let switcher='';
      if(validCnt>1){
        const idx=c.photoIdx||0;
        switcher='<div class="photoSwitch" onclick="event.stopPropagation()">';
        photos.forEach((p,i)=>{ if(p) switcher+=`<button class="${idx===i?'active':''}" onclick="switchPhoto(${JSON.stringify(c.id)},${i})">${i+1}</button>`; });
        switcher+='</div>';
      }
      html+=`<div class="scard" onclick='openEdit(${JSON.stringify(c.id)})'>
        <div class="sthumb">${inner}</div>
        <div class="sname">${esc(c.name)}</div>${switcher}</div>`;
    }
    html+='</div>';
  }
  html+='</div>';
  document.getElementById('main').innerHTML=html;
}

function setMode(m){ mode=m; closeViewer(); render(); }

/* 写真切り替え */
function switchPhoto(id, idx){
  const c=find(id); if(!c)return;
  c.photoIdx=idx; c.photo=(c.photos||[])[idx]||'';
  save(); renderSettings();
}

/* まとめて登録 */
function openBulk(){
  document.getElementById('bulkText').value='';
  document.getElementById('bulkMsg').textContent='';
  document.getElementById('bulkModal').classList.add('show');
}
function closeBulk(){ document.getElementById('bulkModal').classList.remove('show'); }
function runBulk(){
  const txt=document.getElementById('bulkText').value;
  const lines=txt.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  let added=0, updated=0, skipped=0;
  for(const line of lines){
    const parts=line.split(/[,，\t]+/).map(s=>s.trim()).filter(s=>s!=='');
    const name=parts[0]||'';
    const gid=(parts[1]||'').replace(/[^0-9]/g,'');
    if(!name){ skipped++; continue; }
    const photo=gid?(PHOTO_BASE+gid+'.jpg'):'';
    const photos=photo?[photo]:[''];
    let ex=null;
    if(gid) ex=casts.find(c=>c.gid===gid);
    if(!ex) ex=casts.find(c=>c.name===name);
    if(ex){ ex.name=name; if(gid)ex.gid=gid; if(photo)ex.photo=photo;
      if(!ex.photos) ex.photos=[photo]; updated++; }
    else{
      casts.push({id:'c'+Date.now().toString(36)+Math.random().toString(36).slice(2,6),
        name,gid,photo,photos,photoIdx:0,sold:false,shown:false});
      added++;
    }
  }
  save();
  document.getElementById('bulkMsg').textContent=
    `追加 ${added}件 ／ 更新 ${updated}件`+(skipped?` ／ 読み取れず ${skipped}件`:'');
  renderSettings();
}

/* 追加・編集 */
function openAdd(){ editId=null;
  document.getElementById('editTitle').textContent='キャストを追加';
  document.getElementById('fName').value='';
  document.getElementById('fPhoto1').value=''; document.getElementById('fPhoto2').value=''; document.getElementById('fPhoto3').value='';
  document.getElementById('fGid').value='';
  document.getElementById('editDel').style.display='none';
  document.getElementById('nameErr').style.display='none';
  document.getElementById('editModal').classList.add('show');
  setTimeout(()=>document.getElementById('fName').focus(),50); }
function openEdit(id){ const c=find(id); if(!c)return; editId=id;
  const photos=c.photos||[c.photo||''];
  document.getElementById('editTitle').textContent='キャストを編集';
  document.getElementById('fName').value=c.name;
  document.getElementById('fPhoto1').value=photos[0]||'';
  document.getElementById('fPhoto2').value=photos[1]||'';
  document.getElementById('fPhoto3').value=photos[2]||'';
  document.getElementById('fGid').value=c.gid;
  document.getElementById('editDel').style.display='block';
  document.getElementById('nameErr').style.display='none';
  document.getElementById('editModal').classList.add('show'); }
function saveCast(){
  const name=document.getElementById('fName').value.trim();
  const gid=document.getElementById('fGid').value.trim();
  const p1=document.getElementById('fPhoto1').value.trim();
  const p2=document.getElementById('fPhoto2').value.trim();
  const p3=document.getElementById('fPhoto3').value.trim();
  if(!name){ document.getElementById('nameErr').style.display='block'; return; }
  const photos=[p1,p2,p3].filter(Boolean);
  if(photos.length===0) photos.push('');
  if(editId){
    const c=find(editId);
    c.name=name; c.gid=gid; c.photos=photos;
    if(c.photoIdx>=photos.length) c.photoIdx=0;
    c.photo=photos[c.photoIdx]||'';
  } else{
    casts.push({id:'c'+Date.now(),name,gid,photo:photos[0]||'',photos,photoIdx:0,sold:false,shown:false});
  }
  closeEdit(); save(); render(); }
function deleteCast(){ if(!editId)return; const c=find(editId);
  document.getElementById('confirmName').textContent=(c?c.name:'')+' を完全に削除します。元に戻せません。';
  document.getElementById('confirmModal').classList.add('show'); }
function reallyDelete(){ if(!editId){ closeConfirm(); return; }
  casts=casts.filter(c=>c.id!==editId);
  closeConfirm(); closeEdit(); save(); render(); }
function closeConfirm(){ document.getElementById('confirmModal').classList.remove('show'); }
function closeEdit(){ document.getElementById('editModal').classList.remove('show'); editId=null; }

/* ===== 全画面ビューア ===== */
let viewerCastId=null;
const photo2Cache={};
function showPhoto(id){
  if(suppressClick){ suppressClick=false; return; }
  const c=find(id); if(!c)return;
  viewerCastId=id;
  renderViewerPhoto(c,0);
  document.getElementById('viewer').classList.add('show');
}
function renderViewerPhoto(c,idx){
  const body=document.getElementById('viewerBody');
  const sw=document.getElementById('vSwitch');
  const p1=c.photo||'';
  const p2=c.gid?(PHOTO_BASE+c.gid+'_2.jpg'):'';
  const url=idx===1?p2:p1;
  const onerr=idx===1?'onerror="switchViewerPhoto(0)"':'';
  const media=url?`<img src="${esc(url)}" alt="" ${onerr}>`
    :`<div class="vph" style="background:${tint(c.name)}"><div class="big">${esc(c.name[0]||'')}</div></div>`;
  body.innerHTML=media+`<div class="vname">${esc(c.name)}</div>`;
  sw.style.display='none'; sw.innerHTML='';
  if(!p2) return;
  const showSw=()=>{
    sw.innerHTML=
      `<button class="${idx===0?'active':''}" onclick="event.stopPropagation();switchViewerPhoto(0)">①</button>`+
      `<button class="${idx===1?'active':''}" onclick="event.stopPropagation();switchViewerPhoto(1)">②</button>`;
    sw.style.display='flex';
  };
  if(photo2Cache[c.gid]===true){ showSw(); }
  else if(photo2Cache[c.gid]!==false){
    const probe=new Image();
    probe.onload=()=>{ photo2Cache[c.gid]=true; showSw(); };
    probe.onerror=()=>{ photo2Cache[c.gid]=false; };
    probe.src=p2;
  }
}
function switchViewerPhoto(idx){
  const c=find(viewerCastId); if(!c)return;
  renderViewerPhoto(c,idx);
}
function closeViewer(e){ if(e)e.stopPropagation(); document.getElementById('viewer').classList.remove('show'); }

/* ===== 長押しドラッグで「戻す」 ===== */
let g=null, clone=null;
const LP_MS=350, MOVE_CANCEL=12;
function pt(e){ const t=e.touches&&e.touches[0]?e.touches[0]:(e.changedTouches&&e.changedTouches[0]?e.changedTouches[0]:e); return {x:t.clientX,y:t.clientY}; }

function attachDnd(){
  document.querySelectorAll('.card[data-id]').forEach(card=>{
    const id=card.getAttribute('data-id');
    card.addEventListener('touchstart',e=>gestureStart(e,id),{passive:true});
    card.addEventListener('mousedown',e=>gestureStart(e,id));
  });
}
function gestureStart(e,id){
  if(e.type==='mousedown' && e.button!==0) return;
  const p=pt(e);
  g={id,x0:p.x,y0:p.y,dragging:false,lp:setTimeout(()=>startDrag(p.x,p.y),LP_MS)};
}
function gestureMove(e){
  if(!g) return;
  const p=pt(e);
  if(!g.dragging){
    if(Math.hypot(p.x-g.x0,p.y-g.y0)>MOVE_CANCEL){ clearTimeout(g.lp); g=null; }
    return;
  }
  e.preventDefault();
  moveClone(p.x,p.y);
  zoneCheck(p.x,p.y);
}
function gestureEnd(e){
  if(!g) return;
  clearTimeout(g.lp);
  if(g.dragging){
    const p=pt(e);
    const drop=zoneCheck(p.x,p.y);
    endDrag();
    suppressClick=true;
    const id=g.id; g=null;
    if(drop) removeFromCustomer(id);
  }else{ g=null; }
}
function startDrag(x,y){
  if(!g) return;
  g.dragging=true;
  const c=find(g.id);
  clone=document.createElement('div');
  clone.className='dragClone';
  clone.innerHTML=c.photo?`<img src="${esc(c.photo)}">`
    :`<div class="cl-ph" style="background:${tint(c.name)}">${esc(c.name[0]||'')}</div>`;
  document.body.appendChild(clone);
  document.body.classList.add('dragging');
  const z=document.getElementById('returnZone'); if(z) z.classList.add('armed');
  moveClone(x,y);
  if(navigator.vibrate) navigator.vibrate(18);
}
function moveClone(x,y){ if(clone){ clone.style.left=x+'px'; clone.style.top=y+'px'; } }
function zoneCheck(x,y){
  const z=document.getElementById('returnZone'); if(!z) return false;
  const r=z.getBoundingClientRect();
  const inside=x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom;
  z.classList.toggle('over',inside);
  return inside;
}
function endDrag(){
  if(clone){ clone.remove(); clone=null; }
  document.body.classList.remove('dragging');
  const z=document.getElementById('returnZone'); if(z){ z.classList.remove('armed','over'); }
}
document.addEventListener('touchmove',gestureMove,{passive:false});
document.addEventListener('touchend',gestureEnd);
document.addEventListener('touchcancel',()=>{ if(g){clearTimeout(g.lp);} if(g&&g.dragging) endDrag(); g=null; });
document.addEventListener('mousemove',gestureMove);
document.addEventListener('mouseup',gestureEnd);

load(); render();
</script>
